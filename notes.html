body {

  color: var(--text-color);
  transition: background-color 0.3s, color 0.3s;
}

:root[data-theme="light"] body,
:root[data-theme="cold-atoms"] body {

    repeating-linear-gradient(

      transparent,

      rgba(0, 150, 136, 0.03) 70px

    repeating-linear-gradient(
      90deg,

      rgba(0, 150, 136, 0.02) 35px,

}

:root[data-theme="pr-yso"] body {
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 35px,
      rgba(248, 203, 99, 0.08) 35px,
      rgba(248, 203, 99, 0.08) 70px

      transparent,
      transparent 35px,
      rgba(39, 200, 245, 0.05) 35px,
      rgba(39, 200, 245, 0.05) 70px

}

.w3-light-grey, body.w3-light-grey {

}

.w3-white {
  background-color: var(--card-bg) !important;
  color: var(--text-color) !important;
}

.w3-card, .w3-card-4 {

.w3-teal {

.theme-selector {
  float: right;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px;
  margin: 8px 12px;
  background: var(--theme-selector-bg);
  border: 1px solid var(--theme-selector-border);
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.theme-option {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 96px;
  min-height: 32px;
  padding: 0 9px;
  color: var(--theme-option-color);
  cursor: pointer;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  line-height: 1;
  white-space: nowrap;
  transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
}

.theme-option:hover {
  background: rgba(255,255,255,0.16);
}

.theme-option.active {
  background: var(--theme-option-active-bg);
  color: var(--theme-option-active-color);
  border-color: var(--border-color);
  box-shadow: 0 2px 6px rgba(0,0,0,0.14);
}

.theme-option:focus-visible {

}

.theme-option sup {

  line-height: 0;
}

.dropdown .dropbtn {

.dropdown-content {

.dropdown-content a {

.dropdown-content a:first-child:hover {

<script>
const themeAliases = {
  light: 'cold-atoms',
  dark: 'cold-atoms',
  antimatter: 'cold-atoms'
};
const availableThemes = ['cold-atoms', 'pr-yso'];

function normalizeTheme(theme) {
  const normalizedTheme = themeAliases[theme] || theme;
  return availableThemes.includes(normalizedTheme) ? normalizedTheme : 'cold-atoms';
}

function setTheme(theme) {
  const selectedTheme = normalizeTheme(theme);
  document.documentElement.setAttribute('data-theme', selectedTheme);
  localStorage.setItem('theme', selectedTheme);

  document.querySelectorAll('.theme-option').forEach((button) => {
    const isActive = button.dataset.themeOption === selectedTheme;
    button.classList.toggle('active', isActive);
    button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });
}

document.addEventListener('DOMContentLoaded', () => {
  setTheme(localStorage.getItem('theme') || document.documentElement.getAttribute('data-theme'));
});
</script>
